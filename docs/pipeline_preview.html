<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeSIRT Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #23272e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 60px 40px;
  }

  .canvas {
    position: relative;
    width: 820px;
  }

  .pill {
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13.5px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    line-height: 1.2;
  }

  .c-input    { background: #4a4068; color: #e0d8ff; border: 1.5px solid #6b58a8; }
  .c-section  { background: #2b3a4c; color: #b8d4ec; border: 1.5px solid #3d5572; font-size:15px; font-weight:600; padding: 12px 26px; }
  .c-script   { background: #2d3a4a; color: #b8cee0; border: 1.5px solid #3d5268; }
  .c-db-teal  { background: #253838; color: #8eccc6; border: 1.5px solid #3a5c58; }
  .c-db-pink  { background: #45282e; color: #f0a0a4; border: 1.5px solid #6a3840; }
  .c-db-orange{ background: #452e1a; color: #f0b878; border: 1.5px solid #6a4a28; }
  .c-future   { background: #3a2810; color: #f0a850; border: 1.5px dashed #c07a2060; }
  .c-output   { background: #253838; color: #8eccc6; border: 1.5px solid #3a5c58; }

  .subgraph {
    border: 1.5px solid #ffffff0e;
    border-radius: 20px;
    padding: 28px 24px 24px;
    position: relative;
    background: #1c2230;
  }

  .subgraph-label {
    position: absolute;
    top: -11px;
    left: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #5a7898;
    background: #1c2230;
    padding: 0 10px;
  }

  .vline {
    width: 1.5px;
    background: linear-gradient(to bottom, #ffffff22, #ffffff08);
    margin: 0 auto;
  }

  .hrow {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .harrow {
    flex-shrink: 0;
    margin: 0 8px;
  }

  svg.overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
</style>
</head>
<body>
<div class="canvas" id="canvas">

  <svg class="overlay" id="overlay" width="820" height="1200"></svg>

  <!-- INPUT -->
  <div style="display:flex; justify-content:center; margin-bottom:36px;">
    <div class="pill c-input" id="n-input">
      📦 &nbsp;DECam FITS / CSVs
    </div>
  </div>

  <!-- MAIN: two columns -->
  <div style="display:grid; grid-template-columns:210px 1fr; gap:20px; align-items:start;">

    <!-- LEFT col: Stage 0 -->
    <div class="subgraph" id="box-s0" style="display:flex; flex-direction:column; align-items:center; gap:0;">
      <div class="subgraph-label">Stage 0 · Setup</div>
      <div class="pill c-section" id="n-s0title" style="margin-bottom:18px; text-align:center;">
        One-time<br>Setup
      </div>
      <div class="vline" style="height:18px; margin-bottom:14px;"></div>
      <div class="pill c-script" id="n-organize" style="text-align:center; justify-content:center; width:100%;">
        00_organize_data.py
      </div>
    </div>

    <!-- RIGHT col: Pipeline -->
    <div class="subgraph" id="box-pipeline">
      <div class="subgraph-label">Main Pipeline · Stages 1–4</div>

      <!-- DB 1 -->
      <div style="display:flex; justify-content:center; margin-bottom:18px; margin-top:4px;">
        <div class="pill c-db-teal" id="n-db1">🗄 &nbsp;desirt_database.h5</div>
      </div>

      <div class="vline" style="height:18px; margin-bottom:18px;"></div>

      <!-- Stage 1 -->
      <div class="hrow" style="margin-bottom:18px;">
        <div class="pill c-script" id="n-crossmatch" style="flex:1; justify-content:center;">01_crossmatch_ztf.py</div>
        <svg class="harrow" width="36" height="14" viewBox="0 0 36 14">
          <line x1="0" y1="7" x2="28" y2="7" stroke="#ffffff28" stroke-width="1.5"/>
          <polygon points="28,3 36,7 28,11" fill="#ffffff28"/>
        </svg>
        <div class="pill c-db-pink" id="n-db2" style="flex-shrink:0;">master_database.h5</div>
      </div>

      <div class="vline" style="height:18px; margin-bottom:18px;"></div>

      <!-- Stage 2 -->
      <div class="hrow" style="margin-bottom:18px;">
        <div class="pill c-script" id="n-plot" style="flex:1; justify-content:center;">02_plot_lightcurves.py</div>
        <svg class="harrow" width="36" height="14" viewBox="0 0 36 14">
          <line x1="0" y1="7" x2="28" y2="7" stroke="#ffffff28" stroke-width="1.5"/>
          <polygon points="28,3 36,7 28,11" fill="#ffffff28"/>
        </svg>
        <div class="pill c-db-orange" id="n-plots-out" style="flex-shrink:0;">plots/</div>
      </div>

      <div class="vline" style="height:18px; margin-bottom:18px;"></div>

      <!-- Stage 3 -->
      <div class="hrow" style="margin-bottom:18px;">
        <div class="pill c-future" id="n-filter" style="flex:1; justify-content:center;">
          03_filter_candidates.py ⚙️
          <span style="font-size:10px; opacity:0.55; margin-left:6px; font-weight:400;">coming soon</span>
        </div>
        <svg class="harrow" width="36" height="14" viewBox="0 0 36 14">
          <line x1="0" y1="7" x2="28" y2="7" stroke="#f0a85040" stroke-width="1.5" stroke-dasharray="4,3"/>
          <polygon points="28,3 36,7 28,11" fill="#f0a85040"/>
        </svg>
        <div class="pill c-db-orange" id="n-subset" style="flex-shrink:0; opacity:0.8;">candidate_subset.h5</div>
      </div>

      <div class="vline" style="height:18px; margin-bottom:18px;"></div>

      <!-- Stage 4 -->
      <div class="hrow">
        <div class="pill c-script" id="n-summary" style="flex:1; justify-content:center;">04_create_summary.py</div>
        <svg class="harrow" width="36" height="14" viewBox="0 0 36 14">
          <line x1="0" y1="7" x2="28" y2="7" stroke="#ffffff28" stroke-width="1.5"/>
          <polygon points="28,3 36,7 28,11" fill="#ffffff28"/>
        </svg>
        <div class="pill c-output" id="n-output" style="flex-shrink:0;">🌐 &nbsp;summary.html</div>
      </div>

    </div>
  </div>

</div>

<script>
function rc(id) {
  const canvas = document.getElementById('canvas');
  const cr = canvas.getBoundingClientRect();
  const el = document.getElementById(id);
  const r = el.getBoundingClientRect();
  return {
    cx: r.left - cr.left + r.width/2,
    cy: r.top  - cr.top  + r.height/2,
    top:    r.top    - cr.top,
    bottom: r.bottom - cr.top,
    left:   r.left   - cr.left,
    right:  r.right  - cr.left,
    w: r.width, h: r.height
  };
}

function mkArrow(svg, x1,y1, x2,y2, color='#ffffff28', dash=false) {
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len, uy=dy/len;
  // line stops a bit before tip
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2-ux*9); line.setAttribute('y2',y2-uy*9);
  line.setAttribute('stroke',color); line.setAttribute('stroke-width','1.5');
  if(dash) line.setAttribute('stroke-dasharray','5,4');
  svg.appendChild(line);
  const angle=Math.atan2(dy,dx);
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  const a1x=x2-10*Math.cos(angle-0.38), a1y=y2-10*Math.sin(angle-0.38);
  const a2x=x2-10*Math.cos(angle+0.38), a2y=y2-10*Math.sin(angle+0.38);
  poly.setAttribute('points',`${x2},${y2} ${a1x},${a1y} ${a2x},${a2y}`);
  poly.setAttribute('fill',color);
  svg.appendChild(poly);
}

function mkElbow(svg, x1,y1, x2,y2, color='#ffffff28') {
  // goes down then across then down
  const midX = x2;
  const midY = y1 + (y2-y1)*0.5;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const d = `M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2-9}`;
  path.setAttribute('d',d);
  path.setAttribute('stroke',color); path.setAttribute('stroke-width','1.5');
  path.setAttribute('fill','none');
  svg.appendChild(path);
  // down arrowhead
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',`${x2},${y2} ${x2-5},${y2-9} ${x2+5},${y2-9}`);
  poly.setAttribute('fill',color);
  svg.appendChild(poly);
}

window.addEventListener('load', () => {
  // small delay to ensure layout is painted
  setTimeout(() => {
    const svg = document.getElementById('overlay');
    const canvas = document.getElementById('canvas');
    svg.setAttribute('width', canvas.offsetWidth);
    svg.setAttribute('height', canvas.offsetHeight);

    const inp   = rc('n-input');
    const s0box = rc('box-s0');
    const pbox  = rc('box-pipeline');
    const org   = rc('n-organize');
    const db1   = rc('n-db1');

    // Input → top of Stage 0 box
    mkArrow(svg,
      inp.cx - 140, inp.bottom,
      s0box.cx, s0box.top,
      '#8888cc55'
    );

    // Input → top of Pipeline box
    mkArrow(svg,
      inp.cx + 80, inp.bottom,
      pbox.cx, pbox.top,
      '#6699cc55'
    );

    // organize → db1 elbow (right side of org → top of db1)
    mkElbow(svg,
      org.right + 6, org.cy,
      db1.cx, db1.top,
      '#8eccc655'
    );

  }, 80);
});
</script>
</body>
</html>
